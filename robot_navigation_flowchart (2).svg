<svg viewBox="0 0 1400 3100" xmlns="http://www.w3.org/2000/svg" width="1400" height="3100">
  <defs>
    <style>
      .box { fill: #E3F2FD; stroke: #1976D2; stroke-width: 3; }
      .decision { fill: #FFF9C4; stroke: #F57F17; stroke-width: 3; }
      .process { fill: #E8F5E9; stroke: #388E3C; stroke-width: 3; }
      .start-end { fill: #FFEBEE; stroke: #C62828; stroke-width: 3; }
      .text { font-family: Arial, sans-serif; font-size: 18px; text-anchor: middle; }
      .title { font-size: 20px; font-weight: bold; }
      .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .label { font-size: 15px; fill: #000; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="15" markerHeight="15" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 15 4, 0 8" fill="#333" />
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="700" y="50" class="text" style="font-size: 28px; font-weight: bold;">GPS/COMPASS NAVIGATION ROBOT - FLOWCHART</text>

  <!-- START -->
  <circle cx="700" cy="120" r="40" class="start-end"/>
  <text x="700" y="130" class="text title">START</text>

  <path d="M 700 160 L 700 220" class="arrow"/>

  <!-- Initialize Hardware -->
  <rect x="450" y="220" width="500" height="110" class="box" rx="10"/>
  <text x="700" y="260" class="text title">1. Initialize Hardware</text>
  <text x="700" y="285" class="text">Serial, Bluetooth, GPS Module</text>
  <text x="700" y="305" class="text">Configure Compass (QMC5883P) & Motors (PRIZM)</text>

  <path d="M 700 330 L 700 390" class="arrow"/>

  <!-- Configure GPS -->
  <rect x="450" y="390" width="500" height="100" class="box" rx="10"/>
  <text x="700" y="430" class="text title">2. Configure GPS to 5Hz</text>
  <text x="700" y="455" class="text">Send UBLOX_INIT Configuration</text>

  <path d="M 700 490 L 700 550" class="arrow"/>

  <!-- Calibrate Compass -->
  <rect x="400" y="550" width="600" height="120" class="box" rx="10"/>
  <text x="700" y="595" class="text title">3. Calibrate Compass</text>
  <text x="700" y="620" class="text">Spin Robot 360° for 10 Seconds</text>
  <text x="700" y="645" class="text">Measure Min/Max Values → Calculate Hard Iron Offsets</text>

  <path d="M 700 670 L 700 730" class="arrow"/>

  <!-- Get Initial Heading -->
  <rect x="450" y="730" width="500" height="90" class="process" rx="10"/>
  <text x="700" y="770" class="text title">4. Get Initial Compass Heading</text>
  <text x="700" y="795" class="text">Ready for Navigation</text>

  <path d="M 700 820 L 700 880" class="arrow"/>

  <!-- MAIN LOOP -->
  <rect x="450" y="880" width="500" height="70" class="box" rx="10" style="stroke-dasharray: 8,8;"/>
  <text x="700" y="925" class="text title">⚙️ MAIN LOOP BEGINS</text>

  <path d="M 700 950 L 700 1010" class="arrow"/>

  <!-- Bluetooth Check -->
  <polygon points="700,1010 880,1080 700,1150 520,1080" class="decision"/>
  <text x="700" y="1070" class="text title">Bluetooth</text>
  <text x="700" y="1095" class="text">Command?</text>

  <!-- YES -->
  <path d="M 880 1080 L 1080 1080" class="arrow"/>
  <text x="980" y="1070" class="label">YES (S/s)</text>
  <rect x="1080" y="1030" width="220" height="100" class="process" rx="10"/>
  <text x="1190" y="1070" class="text">Stop Motors</text>
  <text x="1190" y="1095" class="text">Disable Navigation</text>

  <path d="M 1190 1030 L 1190 800 L 880 800" class="arrow"/>

  <!-- NO -->
  <path d="M 700 1150 L 700 1210" class="arrow"/>
  <text x="730" y="1175" class="label">NO</text>

  <!-- Navigation Active? -->
  <polygon points="700,1210 880,1280 700,1350 520,1280" class="decision"/>
  <text x="700" y="1270" class="text title">Navigation</text>
  <text x="700" y="1295" class="text">Active?</text>

  <!-- FALSE - Loop back -->
  <path d="M 520 1280 L 300 1280 L 300 905 L 450 905" class="arrow"/>
  <text x="370" y="1275" class="label">FALSE</text>

  <!-- TRUE -->
  <path d="M 700 1350 L 700 1410" class="arrow"/>
  <text x="730" y="1375" class="label">TRUE</text>

  <!-- Read GPS Data -->
  <rect x="450" y="1410" width="500" height="100" class="process" rx="10"/>
  <text x="700" y="1450" class="text title">5. Read GPS Serial Data</text>
  <text x="700" y="1475" class="text">Parse Location Updates (gps.encode())</text>

  <path d="M 700 1510 L 700 1570" class="arrow"/>

  <!-- Update Encoder -->
  <rect x="450" y="1570" width="500" height="100" class="process" rx="10"/>
  <text x="700" y="1610" class="text title">6. Update Encoder Delta</text>
  <text x="700" y="1635" class="text">(If not in PURE_COMPASS_MODE)</text>

  <path d="M 700 1670 L 700 1730" class="arrow"/>

  <!-- GPS Updated? -->
  <polygon points="700,1730 880,1800 700,1870 520,1800" class="decision"/>
  <text x="700" y="1795" class="text title">GPS Location</text>
  <text x="700" y="1820" class="text">Updated?</text>

  <!-- NO - Loop back -->
  <path d="M 880 1800 L 1080 1800 L 1080 905 L 880 905" class="arrow"/>
  <text x="980" y="1795" class="label">NO</text>

  <!-- YES -->
  <path d="M 700 1870 L 700 1930" class="arrow"/>
  <text x="730" y="1895" class="label">YES</text>

  <!-- GPS Processing -->
  <rect x="350" y="1930" width="700" height="130" class="box" rx="10"/>
  <text x="700" y="1970" class="text title">7. GPS Data Processing</text>
  <text x="700" y="1995" class="text">Get Raw Latitude/Longitude → Apply EMA Smoothing (α=0.3)</text>
  <text x="700" y="2020" class="text">Calculate Distance & Bearing to Current Waypoint</text>

  <path d="M 700 2060 L 700 2120" class="arrow"/>

  <!-- Update Compass -->
  <rect x="450" y="2120" width="500" height="90" class="process" rx="10"/>
  <text x="700" y="2160" class="text title">8. Update Compass Heading</text>
  <text x="700" y="2185" class="text">Every 100ms (10Hz Update Rate)</text>

  <path d="M 700 2210 L 700 2270" class="arrow"/>

  <!-- Auto-Offset Learning -->
  <rect x="300" y="2270" width="800" height="150" class="box" rx="10"/>
  <text x="700" y="2310" class="text title">⭐ AUTO-OFFSET LEARNING ALGORITHM ⭐</text>
  <text x="700" y="2340" class="text">IF GPS Speed > 3 km/h: GPS Course = TRUE HEADING</text>
  <text x="700" y="2365" class="text">Calculate Offset Error (GPS Course - Compass Heading)</text>
  <text x="700" y="2390" class="text">First Movement: SNAP offset | Later: Converge at 5% Learning Rate</text>

  <path d="M 700 2420 L 700 2480" class="arrow"/>

  <!-- Select Heading Source -->
  <rect x="450" y="2480" width="500" height="100" class="process" rx="10"/>
  <text x="700" y="2520" class="text title">9. Select Heading Source</text>
  <text x="700" y="2545" class="text">Use PURE_COMPASS_MODE or Hybrid (GPS+Compass)?</text>

  <path d="M 700 2580 L 700 2640" class="arrow"/>

  <!-- Calculate Error -->
  <rect x="450" y="2640" width="500" height="100" class="process" rx="10"/>
  <text x="700" y="2680" class="text title">10. Calculate Heading Error</text>
  <text x="700" y="2705" class="text">Find Shortest Rotation to Target Bearing</text>

  <path d="M 700 2740 L 700 2800" class="arrow"/>

  <!-- Print Debug -->
  <rect x="450" y="2800" width="500" height="110" class="process" rx="10"/>
  <text x="700" y="2840" class="text title">11. Print Debug Telemetry</text>
  <text x="700" y="2865" class="text">Hdg | GPS Course | Offset | Error | Distance</text>

  <path d="M 700 2910 L 700 2970" class="arrow"/>

  <!-- Distance Check -->
  <polygon points="700,2970 880,3040 700,3110 520,3040" class="decision"/>
  <text x="700" y="3030" class="text title">Distance</text>
  <text x="700" y="3055" class="text">< 5m?</text>

  <!-- YES -->
  <path d="M 880 3040 L 1100 3040" class="arrow"/>
  <text x="990" y="3030" class="label">YES</text>
  <rect x="1100" y="2980" width="260" height="120" class="process" rx="10"/>
  <text x="1230" y="3015" class="text">Stop Motors</text>
  <text x="1230" y="3040" class="text">Next Waypoint</text>
  <text x="1230" y="3065" class="text">Loop Back</text>

  <path d="M 1230 2980 L 1230 905 L 880 905" class="arrow"/>

  <!-- NO -->
  <path d="M 700 3110 L 700 3170" class="arrow"/>
  <text x="730" y="3135" class="label">NO</text>

  <!-- Movement Decision -->
  <polygon points="700,3170 880,3240 700,3310 520,3240" class="decision"/>
  <text x="700" y="3230" class="text title">Heading</text>
  <text x="700" y="3255" class="text">Error > 25°?</text>

  <!-- YES - TURN -->
  <path d="M 880 3240 L 1100 3240" class="arrow"/>
  <text x="990" y="3230" class="label">YES</text>
  <rect x="1100" y="3190" width="260" height="100" class="process" rx="10"/>
  <text x="1230" y="3225" class="text">TURN IN PLACE</text>
  <text x="1230" y="3250" class="text">Motor Power: 45</text>

  <!-- NO - CRUISE -->
  <path d="M 520 3240 L 300 3240" class="arrow"/>
  <text x="390" y="3230" class="label">NO</text>
  <rect x="40" y="3190" width="260" height="100" class="process" rx="10"/>
  <text x="170" y="3225" class="text">CRUISE + STEER</text>
  <text x="170" y="3250" class="text">Proportional (Kp=2.0)</text>

  <!-- Loop back -->
  <path d="M 1230 3190 L 1230 905 L 880 905" class="arrow"/>
  <path d="M 170 3190 L 170 905 L 450 905" class="arrow"/>

</svg>
